  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  hazelnut_shared:
    path: ../hazelnut_shared
  hazelnut_ui:
    path: ../hazelnut_ui
  english_words: ^4.0.0
  provider: ^6.1.5
  shared_preferences: ^2.2.2
  firebase_messaging: ^15.2.7
  firebase_core: ^3.14.0
  permission_handler: ^12.0.0+1
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6
  google_fonts: ^6.2.1
  image_picker: ^1.1.2
  web_socket_channel: ^3.0.3
  http: ^1.4.0
  image_cropper: ^9.1.0
  smooth_page_indicator: ^1.2.1
  sqflite: ^2.4.2
  path: ^1.9.0
  workmanager: ^0.9.0+2
  encrypt: ^5.0.3
  pointycastle: ^3.9.1
  aes256gcm: ^1.0.1
  firebase_auth: ^5.7.0
  flutter_secure_storage: ^9.2.4
  flutter_riverpod: ^3.0.3
  flutter_local_notifications: ^19.4.2
  crypto: ^3.0.6
  mlkem_native: ^1.0.3
  ffi: ^2.0.0
  flutter_dotenv: ^6.0.0
  cryptography: ^2.9.0
  characters: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

